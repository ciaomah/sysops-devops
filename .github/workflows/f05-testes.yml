name: testes

on:
  push:
    paths:
      - "f05/**"
  pull_request:
    paths:
      - "f05/**"

jobs:
    pytest:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            - name: Install dependencies
              run: pip install pytest
            - name: Run tests
              working-directory: ./f05
              run: python -m pytest
