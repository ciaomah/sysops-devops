name: artefatos

on: push

jobs:
    gerar-manifesto:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Produzir um manifesto
              run: |
                mkdir -p saida
                echo "Manifesto do build $(date)" > saida/manifesto.txt
                echo "Commit: ${{ github.sha }}" >> saida/manifesto.txt
            - name: Guardar na prateleira
              uses: actions/upload-artifact@v4
              with:
                name: manifesto-do-build
                path: saida/

    usar-manifesto:
        needs: gerar-manifesto
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                name: manifesto-do-build
            - run: cat manifesto.txt
