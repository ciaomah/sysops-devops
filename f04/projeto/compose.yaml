services:
  web:
    build: ./app
    ports:
      - "8000:5000"
    environment:
      HOST: banco
      NAME: mural
      USER: operario
      PASSWORD: treino123
    depends_on:
      - banco

  banco:
    image: postgres:16
    environment:
      POSTGRES_DB: mural
      POSTGRES_USER: operario
      POSTGRES_PASSWORD: treino123
    volumes:
      - dados:/var/lib/postgresql/data

volumes:
  dados:
